#cloud-config

package_update: true
package_upgrade: false

packages:
  - curl
  - wget
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

write_files:
  - path: /etc/sysctl.d/99-k3s.conf
    permissions: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

  - path: /etc/modules-load.d/k3s.conf
    permissions: "0644"
    content: |
      overlay
      br_netfilter

runcmd:
  # Disable swap (required for k3s)
  - swapoff -a
  - sed -i '/ swap / s/^/#/' /etc/fstab

  # Load required kernel modules immediately (write_files handles persistence)
  - modprobe overlay
  - modprobe br_netfilter

  # Apply sysctl settings for k3s networking
  - sysctl --system

  # Wait for network connectivity before attempting download (up to 5 min)
  - |
    attempt=0
    until curl -sf --connect-timeout 5 https://get.k3s.io > /dev/null 2>&1; do
      attempt=$((attempt + 1))
      if [ "$attempt" -ge 30 ]; then
        echo "ERROR: network not available after 5 minutes, aborting k3s install" >&2
        exit 1
      fi
      echo "Waiting for network... attempt $attempt"
      sleep 10
    done

  # Install k3s server (log output to help diagnose failures)
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" K3S_KUBECONFIG_MODE="644" sh - 2>&1 | tee /var/log/k3s-install.log

  # Enable and start k3s service
  - systemctl enable k3s
  - systemctl start k3s

  # Wait for k3s to be ready (timeout after 5 min)
  - |
    attempt=0
    until kubectl get nodes 2>/dev/null | grep -q " Ready"; do
      attempt=$((attempt + 1))
      if [ "$attempt" -ge 60 ]; then
        echo "ERROR: k3s not ready after 5 minutes" >&2
        exit 1
      fi
      echo "Waiting for k3s to be ready... attempt $attempt"
      sleep 5
    done
    echo "k3s is ready."

  # Save kubeconfig to default location for azureuser
  - mkdir -p /home/azureuser/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/azureuser/.kube/config
  - chown -R azureuser:azureuser /home/azureuser/.kube
  - chmod 600 /home/azureuser/.kube/config

  # Add KUBECONFIG to azureuser profile
  - echo 'export KUBECONFIG=$HOME/.kube/config' >> /home/azureuser/.bashrc

final_message: "k3s installation complete. Node is ready after $UPTIME seconds."
