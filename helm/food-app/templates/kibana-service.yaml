{{- if .Values.kibana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kibana.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.kibana.name }}
spec:
  type: {{ .Values.kibana.service.type }}
  ports:
  - port: {{ .Values.kibana.service.port }}
    targetPort: {{ .Values.kibana.port }}
    protocol: TCP
  selector:
    app: {{ .Values.kibana.name }}
{{- end }}
