{{- if .Values.elasticsearch.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.elasticsearch.name }}-pv
  labels:
    type: local
    app: {{ .Values.elasticsearch.name }}
spec:
  storageClassName: {{ .Values.elasticsearch.storage.storageClassName }}
  capacity:
    storage: {{ .Values.elasticsearch.storage.size }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ .Values.elasticsearch.storage.hostPath }}
{{- end }}
