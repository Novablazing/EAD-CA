{{- if .Values.fluentd.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.fluentd.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.fluentd.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.fluentd.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.fluentd.name }}
    spec:
      serviceAccountName: {{ .Values.fluentd.name }}
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
      containers:
      - name: {{ .Values.fluentd.name }}
        image: {{ .Values.fluentd.image }}:{{ .Values.fluentd.tag }}
        env:
        - name: FLUENT_ELASTICSEARCH_HOST
          value: {{ .Values.fluentd.elasticsearch.host | quote }}
        - name: FLUENT_ELASTICSEARCH_PORT
          value: {{ .Values.fluentd.elasticsearch.port | quote }}
        - name: FLUENT_ELASTICSEARCH_SCHEME
          value: {{ .Values.fluentd.elasticsearch.scheme | quote }}
        - name: FLUENT_ELASTICSEARCH_USER
          value: "elastic"
        - name: FLUENT_ELASTICSEARCH_PASSWORD
          value: "changeme"
        - name: FLUENTD_SYSTEMD_CONF
          value: "disable"
        resources:
          requests:
            cpu: {{ .Values.fluentd.resources.requests.cpu }}
            memory: {{ .Values.fluentd.resources.requests.memory }}
          limits:
            cpu: {{ .Values.fluentd.resources.limits.cpu }}
            memory: {{ .Values.fluentd.resources.limits.memory }}
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: dockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: fluentd-config
          mountPath: /fluentd/etc/fluent.conf
          subPath: fluent.conf
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: dockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: fluentd-config
        configMap:
          name: {{ .Values.fluentd.name }}-config
{{- end }}
