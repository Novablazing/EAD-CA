namespace: food-qa

backend:
  image: ghcr.io/novablazing/food-backend
  tag: qa
  imagePullPolicy: Always
  replicas: 2
  env:
    databaseUrl: "mongodb://mongodb-service:27017/"
    databaseName: "ead_qa"
    databaseCollection: "ead_qa_2024"

frontend:
  image: ghcr.io/novablazing/food-frontend
  tag: qa
  imagePullPolicy: Always
  replicas: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

mongodb:
  replicas: 1

velero:
  enabled: true
  schedules:
    food-app-daily:
      disabled: false
      schedule: "0 2 * * *"
      template:
        includedNamespaces:
          - food-qa
        ttl: "168h"
