namespace: food

imagePullSecret:
  username: ""
  password: ""

backend:
  name: recipe-backend
  image: backend
  tag: v1
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  env:
    databaseUrl: "mongodb://mongodb-service:27017/"
    databaseName: "ead_ca2"
    databaseCollection: "ead_2024"
  service:
    type: ClusterIP
    port: 8080
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

frontend:
  name: recipe-frontend
  image: frontend
  tag: v1
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 22137
  service:
    type: ClusterIP
    port: 22137
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    tcpSocket:
      port: 22137
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: 22137
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

nginx:
  name: nginx
  image: nginx
  tag: stable
  replicas: 1

mongodb:
  name: mongodb
  image: mongo
  tag: latest
  replicas: 1
  port: 27017
  storage:
    size: 1Gi
    hostPath: /mnt/data/mongodb
    storageClassName: manual
  service:
    name: mongodb-service
    port: 27017
