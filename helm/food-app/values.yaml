namespace: food

imagePullSecret:
  username: ""
  password: ""

backend:
  name: recipe-backend
  image: backend
  tag: v1
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  env:
    databaseUrl: "mongodb://mongodb-service:27017/"
    databaseName: "ead_ca2"
    databaseCollection: "ead_2024"
  service:
    type: ClusterIP
    port: 8080
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

frontend:
  name: recipe-frontend
  image: frontend
  tag: v1
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 22137
  service:
    type: ClusterIP
    port: 22137
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    tcpSocket:
      port: 22137
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: 22137
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

ingress:
  name: food-app-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

mongodb:
  name: mongodb
  image: mongo
  tag: latest
  replicas: 1
  port: 27017
  storage:
    size: 1Gi
    hostPath: /mnt/data/mongodb
    storageClassName: manual
  service:
    name: mongodb-service
    port: 27017

# Velero backup configuration
velero:
  enabled: false
  deployNodeAgent: false
  configuration:
    backupStorageLocation:
      - name: default
        provider: aws
        bucket: velero-backups
        config:
          region: minio
          s3ForcePathStyle: true
          s3Url: http://minio.velero.svc:9000
  credentials:
    useSecret: true
    secretContents:
      cloud: |
        [default]
        aws_access_key_id = minio
        aws_secret_access_key = minio123
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.11.1
      volumeMounts:
        - mountPath: /target
          name: plugins
  schedules:
    food-app-daily:
      disabled: false
      schedule: "0 2 * * *"
      template:
        includedNamespaces:
          - food
        ttl: "168h"
