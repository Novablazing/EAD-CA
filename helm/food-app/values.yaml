namespace: food

imagePullSecret:
  username: ""
  password: ""

backend:
  name: recipe-backend
  image: backend
  tag: v1
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  env:
    databaseUrl: "mongodb://mongouser:mongopass@mongodb-service:27017/?authSource=admin"
    databaseName: "ead_prod"
    databaseCollection: "ead_prod_2024"
  service:
    type: ClusterIP
    port: 8080
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

frontend:
  name: recipe-frontend
  image: frontend
  tag: v1
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 22137
  service:
    type: ClusterIP
    port: 22137
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  livenessProbe:
    tcpSocket:
      port: 22137
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: 22137
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

ingress:
  name: food-app-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

elasticsearch:
  enabled: true
  name: elasticsearch
  image: docker.elastic.co/elasticsearch/elasticsearch
  tag: "7.17.16"
  replicas: 1
  port: 9200
  transportPort: 9300
  env:
    discoveryType: single-node
    esJavaOpts: "-Xms512m -Xmx512m"
    xpackSecurityEnabled: "false"
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  storage:
    size: 5Gi
    storageClassName: manual
    hostPath: /mnt/data/elasticsearch
  service:
    type: ClusterIP
    port: 9200

kibana:
  enabled: true
  name: kibana
  image: docker.elastic.co/kibana/kibana
  tag: "7.17.16"
  replicas: 1
  port: 5601
  env:
    elasticsearchHosts: "http://elasticsearch:9200"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: NodePort
    port: 5601
    nodePort: 30561

fluentd:
  enabled: true
  name: fluentd
  image: fluent/fluentd-kubernetes-daemonset
  tag: "v1.16-debian-elasticsearch7-1"
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  elasticsearch:
    host: elasticsearch
    port: 9200
    scheme: http
    logstashPrefix: food-app

mongodb:
  name: mongodb
  image: mongo
  tag: latest
  replicas: 1
  port: 27017
  storage:
    size: 1Gi
    hostPath: /mnt/data/mongodb
    storageClassName: manual
  auth:
    rootUsername: mongouser
    rootPassword: mongopass
  service:
    name: mongodb-service
    port: 27017
