name: Helm Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to roll back"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      helm_revision:
        description: "Helm revision number to roll back to (leave blank or 0 for previous release)"
        required: false
        default: "0"

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.environment }}
    runs-on: self-hosted
    environment: ${{ github.event.inputs.environment }}   # triggers required-reviewer gate on prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve environment config
        id: env_config
        run: |
          case "${{ github.event.inputs.environment }}" in
            dev)
              echo "release=food-app-dev"      >> $GITHUB_OUTPUT
              echo "namespace=food-dev"         >> $GITHUB_OUTPUT
              echo "kubeconfig=/home/vyshnav/kubeconfigenv/kubeconfig-dev" >> $GITHUB_OUTPUT
              ;;
            qa)
              echo "release=food-app-qa"        >> $GITHUB_OUTPUT
              echo "namespace=food-qa"           >> $GITHUB_OUTPUT
              echo "kubeconfig=/home/vyshnav/kubeconfigenv/kubeconfig-qa"  >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "release=food-app-prod"      >> $GITHUB_OUTPUT
              echo "namespace=food-prod"         >> $GITHUB_OUTPUT
              echo "kubeconfig=/home/vyshnav/kubeconfigenv/kubeconfig-prod" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unknown environment: ${{ github.event.inputs.environment }}"
              exit 1
              ;;
          esac

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          cp ${{ steps.env_config.outputs.kubeconfig }} ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm rollback
        env:
          KUBECONFIG: ${{ steps.env_config.outputs.kubeconfig }}
        run: |
          REVISION="${{ github.event.inputs.helm_revision }}"
          echo "Rolling back ${{ steps.env_config.outputs.release }} in ${{ steps.env_config.outputs.namespace }}..."
          if [[ "$REVISION" == "0" || -z "$REVISION" ]]; then
            helm rollback ${{ steps.env_config.outputs.release }} \
              --namespace default \
              --kubeconfig ${{ steps.env_config.outputs.kubeconfig }} \
              --wait \
              --timeout 5m0s
          else
            helm rollback ${{ steps.env_config.outputs.release }} "$REVISION" \
              --namespace ${{ steps.env_config.outputs.namespace }} \
              --kubeconfig ${{ steps.env_config.outputs.kubeconfig }} \
              --wait \
              --timeout 5m0s
          fi

      - name: Verify rollout
        env:
          KUBECONFIG: ${{ steps.env_config.outputs.kubeconfig }}
        run: |
          kubectl rollout status deployment/recipe-backend  \
            -n ${{ steps.env_config.outputs.namespace }}
          kubectl rollout status deployment/recipe-frontend \
            -n ${{ steps.env_config.outputs.namespace }}

