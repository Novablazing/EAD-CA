name: Velero Backup & Restore

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - install
          - backup
          - restore
      backup_name:
        description: "Backup name (required for restore, auto-generated for backup)"
        required: false
        type: string

jobs:
  velero:
    name: Velero ${{ inputs.action }} — ${{ inputs.environment }}
    runs-on: self-hosted
    env:
      KUBECONFIG: /home/vyshnav/kubeconfigenv/kubeconfig-${{ inputs.environment }}

    steps:
      - name: Validate inputs
        run: |
          if [ "${{ inputs.action }}" = "restore" ] && [ -z "${{ inputs.backup_name }}" ]; then
            echo "::error::backup_name is required for restore action"
            exit 1
          fi

      - name: Verify cluster connectivity
        run: |
          echo "Using kubeconfig: $KUBECONFIG"
          kubectl cluster-info --kubeconfig "$KUBECONFIG"

      - name: Install Velero with Azure plugin
        if: inputs.action == 'install'
        run: |
          BLOB_CONTAINER="velero-${{ inputs.environment }}"

          # Create the blob container in the storage account if it doesn't exist
          az storage container create \
            --name "$BLOB_CONTAINER" \
            --account-name eadca \
            --auth-mode login \
            --public-access off

          # Get Azure account details from local CLI config
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          TENANT_ID=$(az account show --query tenantId -o tsv)

          # Create Velero credentials file from local Azure config
          CREDENTIALS_FILE=$(mktemp)
          cat <<EOF > "$CREDENTIALS_FILE"
          AZURE_SUBSCRIPTION_ID=${SUBSCRIPTION_ID}
          AZURE_TENANT_ID=${TENANT_ID}
          AZURE_RESOURCE_GROUP=EADCA2
          AZURE_CLOUD_NAME=AzurePublicCloud
          AZURE_STORAGE_ACCOUNT_ACCESS_KEY=${{ secrets.AZURE_STORAGE_ACCESS_KEY }}
          EOF

          # Install Velero with Azure Blob Storage plugin
          velero install \
            --provider azure \
            --plugins velero/velero-plugin-for-microsoft-azure:v1.11.0 \
            --bucket "$BLOB_CONTAINER" \
            --secret-file "$CREDENTIALS_FILE" \
            --backup-location-config "resourceGroup=EADCA2,storageAccount=eadca,storageAccountKeyEnvVar=AZURE_STORAGE_ACCOUNT_ACCESS_KEY,subscriptionId=${SUBSCRIPTION_ID}" \
            --kubeconfig "$KUBECONFIG" \
            --wait

          rm -f "$CREDENTIALS_FILE"

          echo "Velero installed successfully."
          kubectl get deployment -n velero --kubeconfig "$KUBECONFIG"

      - name: Verify Velero is installed
        if: inputs.action == 'backup' || inputs.action == 'restore'
        run: |
          if ! kubectl get crd backups.velero.io --kubeconfig "$KUBECONFIG" &>/dev/null; then
            echo "::error::Velero CRDs not found. Run this workflow with action=install first."
            exit 1
          fi
          echo "Velero CRDs found."
          kubectl get deployment -n velero --kubeconfig "$KUBECONFIG"
          if ! kubectl get deployment velero -n velero --kubeconfig "$KUBECONFIG" &>/dev/null; then
            echo "::error::Velero server deployment not found in the 'velero' namespace."
            exit 1
          fi
          echo "Velero server is deployed."

          # Verify backup storage location is available
          velero backup-location get --kubeconfig "$KUBECONFIG"

      - name: Create backup
        if: inputs.action == 'backup'
        run: |
          BACKUP_NAME="${{ inputs.environment }}-backup-$(date +%Y%m%d-%H%M%S)"
          echo "BACKUP_NAME=$BACKUP_NAME" >> "$GITHUB_ENV"

          echo "Creating backup: $BACKUP_NAME"
          velero backup create "$BACKUP_NAME" \
            --kubeconfig "$KUBECONFIG" \
            --wait

          echo "Backup completed. Details:"
          velero backup describe "$BACKUP_NAME" --kubeconfig "$KUBECONFIG"
          velero backup logs "$BACKUP_NAME" --kubeconfig "$KUBECONFIG"

      - name: Restore from backup
        if: inputs.action == 'restore'
        run: |
          BACKUP_NAME="${{ inputs.backup_name }}"
          echo "BACKUP_NAME=$BACKUP_NAME" >> "$GITHUB_ENV"

          echo "Verifying backup exists: $BACKUP_NAME"
          velero backup describe "$BACKUP_NAME" --kubeconfig "$KUBECONFIG"

          echo "Restoring from backup: $BACKUP_NAME"
          RESTORE_NAME="${BACKUP_NAME}-restore-$(date +%Y%m%d-%H%M%S)"
          velero restore create "$RESTORE_NAME" \
            --from-backup "$BACKUP_NAME" \
            --kubeconfig "$KUBECONFIG" \
            --wait

          echo "Restore completed. Details:"
          velero restore describe "$RESTORE_NAME" --kubeconfig "$KUBECONFIG"
          velero restore logs "$RESTORE_NAME" --kubeconfig "$KUBECONFIG"

      - name: Summary
        run: |
          echo "========================================="
          echo "Action:         ${{ inputs.action }}"
          echo "Environment:    ${{ inputs.environment }}"
          echo "Storage Account: eadca"
          echo "Blob Container: velero-${{ inputs.environment }}"
          echo "Backup Name:    ${BACKUP_NAME:-N/A}"
          echo "Kubeconfig:     $KUBECONFIG"
          echo "========================================="
