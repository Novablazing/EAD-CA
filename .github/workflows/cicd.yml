  deploy-dev:
    name: Deploy → Dev
    # needs: build-push
    if: github.ref_name == 'dev'
    runs-on: self-hosted   # use self-hosted runner with Terraform, kubectl, Helm installed
    environment: dev        # configure protection rules in GitHub repo Settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: terraform plan -var-file=dev.tfvars -var="admin_password=${{ secrets.TF_ADMIN_PASSWORD }}" -out=tfplan-dev

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan-dev

      - name: Configure kubeconfig (dev cluster)
        run: |
          mkdir -p /home/vyshnav/kubeconfigenv
          cp /home/vyshnav/kubeconfigenv/kubeconfig-dev ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create GHCR imagePullSecret
        env:
          KUBECONFIG: /home/vyshnav/kubeconfigenv/kubeconfig-dev
        run: |
          kubectl create namespace food-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace food-dev app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace food-dev \
            meta.helm.sh/release-name=food-app-dev \
            meta.helm.sh/release-namespace=default \
            --overwrite
          kubectl create secret docker-registry ghcr-secret \
            --namespace food-dev \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy to dev
        run: |
          helm upgrade --install food-app-dev ./helm/food-app \
            -f ./helm/food-app/values-dev.yaml \
            --kubeconfig /home/vyshnav/kubeconfigenv/kubeconfig-dev \
            --set backend.image=ghcr.io/${{ github.repository_owner }}/food-backend \
            --set backend.tag=dev \
            --set frontend.image=ghcr.io/${{ github.repository_owner }}/food-frontend \
            --set frontend.tag=dev \
            --wait --timeout 5m

      - name: Verify rollout
        env:
          KUBECONFIG: /home/vyshnav/kubeconfigenv/kubeconfig-dev
        run: |
          kubectl rollout status deployment/recipe-backend -n food-dev
          kubectl rollout status deployment/recipe-frontend -n food-dev

