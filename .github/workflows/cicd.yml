name: Kubernetes Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
      - qa
    paths-ignore:
      - '.github/workflows/**'

env:
  REPOSITORY: ghcr.io/novablazing

jobs:
  Application_Deployment:
  
    runs-on: self-hosted
    steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Log in to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GHCR_TOKEN }}

        - name: Docker Image Build and Push
          run: |
            docker build -t ${{ env.REPOSITORY }}/backend:v1 ./app/Backend
            docker build -t ${{ env.REPOSITORY }}/frontend:v1 ./app/Frontend
            docker push ${{ env.REPOSITORY }}/backend:v1
            docker push ${{ env.REPOSITORY }}/frontend:v1
            docker images

        